<!DOCTYPE html>
<html>
<head>
    <title>My Student Profile</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000000; /* Black background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background-color: #1c1c1c; /* Dark card so it stands out from black */
            padding: 25px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2); /* light shadow for contrast */
            text-align: center;
        }

        h1 {
            color: #ffffff; /* White text */
        }

        p {
            font-size: 16px;
            margin: 8px 0;
            color: #f0f0f0; /* Light gray text for readability */
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            border: none;
            background-color: #ffffff; /* White button */
            color: #000000; /* Black text on button */
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover {
            background-color: #e0e0e0; /* Slightly gray on hover */
        }

        .highlight {
            color: #ffcc00; /* Yellowish highlight for labels */
            font-weight: bold;
        }
    </style>

</head>
<body>

    <div class="card">
        <h1>Student Profile</h1>

        <p><span class="highlight">Name:</span> Raj Vasani</p>
        <p><span class="highlight">Enrollment Number:</span> 25ITUOS144</p>
        <p><span class="highlight">Roll No:</span> 144</p>
        <p><span class="highlight">Division:</span> F</p>
        <p><span class="highlight">Batch:</span> f3</p>
        <p><span class="highlight">College:</span> Dharmsinh Desai University</p>
        <p><span class="highlight">Subject:</span> Hardware Workshop</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Welcome to my website! 😊");
        }
    </script>

</body>
</html>
