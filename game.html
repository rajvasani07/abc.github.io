<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      background-color: #222;
      color: #fff;
    }

    h1 {
      margin-top: 20px;
    }

    canvas {
      background-color: #111;
      margin-top: 20px;
      border: 2px solid #fff;
    }

    #score {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <p id="score">Score: 0</p>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const grid = 20; // size of each square
    let count = 0;
    let snake = [{x: 160, y: 160}];
    let dx = grid; // moving right initially
    let dy = 0;
    let food = randomFood();
    let score = 0;

    // Game loop
    function loop() {
      requestAnimationFrame(loop);

      if (++count < 10) return; // slower snake speed (increase number to slow more)
      count = 0;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Move snake
      let head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head);

      // Check for food collision
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        document.getElementById('score').textContent = 'Score: ' + score;
        food = randomFood();
      } else {
        snake.pop(); // remove tail if no food eaten
      }

      // Draw food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, grid-1, grid-1);

      // Draw snake
      ctx.fillStyle = 'lime';
      snake.forEach(segment => ctx.fillRect(segment.x, segment.y, grid-1, grid-1));

      // Check wall collision or self collision
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || collision(head, snake.slice(1))) {
        alert('Game Over! Score: ' + score);
        snake = [{x: 160, y: 160}];
        dx = grid;
        dy = 0;
        score = 0;
        document.getElementById('score').textContent = 'Score: ' + score;
        food = randomFood();
      }
    }

    // Generate random food
    function randomFood() {
      return {
        x: Math.floor(Math.random() * (canvas.width / grid)) * grid,
        y: Math.floor(Math.random() * (canvas.height / grid)) * grid
      };
    }

    // Check if snake collides with itself
    function collision(head, snakeBody) {
      return snakeBody.some(segment => segment.x === head.x && segment.y === head.y);
    }

    // Keyboard controls
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft' && dx === 0) { dx = -grid; dy = 0; }
      if (e.key === 'ArrowUp' && dy === 0) { dx = 0; dy = -grid; }
      if (e.key === 'ArrowRight' && dx === 0) { dx = grid; dy = 0; }
      if (e.key === 'ArrowDown' && dy === 0) { dx = 0; dy = grid; }
    });

    requestAnimationFrame(loop);
  </script>
</body>
</html>
